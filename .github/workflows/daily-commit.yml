name: Random Auto Commit (15–75)

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "Prashan Prajapati"
          git config user.email "officialprashan@gmail.com"

      - name: Generate random commits
        run: |
          # Random number between 15 and 75
          COUNT=$((RANDOM % 61 + 15))
          echo "Making $COUNT commits"

          for i in $(seq 1 $COUNT)
          do
            # Ensure unique content every time
            echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - Update $i - $RANDOM" >> activity.log

            git add activity.log
            git commit -m "chore: random update $i $(date -u '+%Y-%m-%d %H:%M:%S') UTC"

            # Random delay (1–15 sec)
            sleep $((RANDOM % 15 + 1))
          done

          git push
